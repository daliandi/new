<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>无人机详情 - [[${drone.name}]]</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --warning-color: #f39c12;
            --danger-color: #e74c3c;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-primary: #2c3e50;
            --text-secondary: #7f8c8d;
            --border-color: #e8e8e8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background:
                linear-gradient(145deg,
                    #f5f5f5 0%,
                    #d4d4d4 25%,
                    #c0c0c0 50%,
                    #a8a8a8 75%,
                    #989898 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse 80% 50% at 20% 10%, rgba(255, 255, 255, 0.5) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 80% 90%, rgba(255, 255, 255, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse 100% 60% at 50% 50%, rgba(180, 180, 180, 0.15) 0%, transparent 70%),
                repeating-linear-gradient(90deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.02) 2px,
                    rgba(0, 0, 0, 0.02) 4px);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 800px;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
            margin: 0 auto;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 24px;
            transition: color 0.15s ease;
        }

        .back-link:hover {
            color: var(--accent-color);
            text-decoration: none;
        }

        .detail-card {
            background: linear-gradient(145deg, #ffffff 0%, #f5f5f5 100%);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .card-header {
            padding: 28px 32px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, #f8f8f8 0%, #e8e8e8 100%);
        }

        .card-header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .drone-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--accent-color), #2980b9);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }

        .card-title h2 {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .card-title p {
            font-size: 13px;
            color: var(--text-secondary);
            margin: 0;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        .status-badge::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .status-badge:hover::before {
            left: 100%;
        }

        .status-operational {
            background: linear-gradient(135deg, #10b981 0%, #059669 50%, #047857 100%);
            color: #ffffff;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.4);
        }

        .status-maintenance {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 50%, #b45309 100%);
            color: #ffffff;
            box-shadow: 0 4px 14px rgba(245, 158, 11, 0.4);
        }

        .status-retired,
        .status-damaged {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 50%, #b91c1c 100%);
            color: #ffffff;
            box-shadow: 0 4px 14px rgba(239, 68, 68, 0.4);
        }

        .status-unknown {
            background: linear-gradient(135deg, #6b7280 0%, #4b5563 50%, #374151 100%);
            color: #ffffff;
            box-shadow: 0 4px 14px rgba(107, 114, 128, 0.4);
        }

        .card-body {
            padding: 32px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        .info-item {
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 12px;
            transition: all 0.15s ease;
        }

        .info-item:hover {
            background-color: #f0f4f8;
        }

        .info-label {
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .info-value {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .info-value.mono {
            font-family: "SF Mono", Monaco, monospace;
            font-size: 13px;
        }

        .info-item.full-width {
            grid-column: 1 / -1;
        }

        .card-footer {
            padding: 24px 32px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: #2980b9;
            transform: translateY(-1px);
        }

        .btn-warning {
            background-color: var(--warning-color);
            color: white;
        }

        .btn-warning:hover {
            background-color: #d68910;
        }

        .btn-danger {
            background-color: var(--danger-color);
            color: white;
        }

        .btn-danger:hover {
            background-color: #c0392b;
        }

        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        .btn-outline:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .meta-info {
            display: flex;
            gap: 24px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border-color);
        }

        .meta-item {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .meta-item span {
            color: var(--text-primary);
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div layout:fragment="content">
        <div class="container">
            <a th:href="@{/drones}" class="back-link">
                <i class="fa fa-arrow-left"></i> 返回无人机列表
            </a>

            <div class="detail-card">
                <div class="card-header">
                    <div class="card-header-left">
                        <div class="drone-icon">
                            <i class="fa fa-plane"></i>
                        </div>
                        <div class="card-title">
                            <h2 th:text="${drone.name}">无人机名称</h2>
                            <p>型号：<span th:text="${drone.model}">M1</span> | 制造商：<span
                                    th:text="${drone.manufacturer}">DJI</span></p>
                        </div>
                    </div>
                    <span th:if="${drone.status == '运行中'}" class="status-badge status-operational">运行中</span>
                    <span th:if="${drone.status == '维护中'}" class="status-badge status-maintenance">维护中</span>
                    <span th:if="${drone.status == '已退役'}" class="status-badge status-retired">已退役</span>
                    <span th:if="${drone.status == '已损坏'}" class="status-badge status-damaged">已损坏</span>
                    <span
                        th:if="${drone.status != '运行中' && drone.status != '维护中' && drone.status != '已退役' && drone.status != '已损坏'}"
                        class="status-badge status-unknown" th:text="${drone.status}"></span>
                </div>

                <div class="card-body">
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">序列号</div>
                            <div class="info-value mono" th:text="${drone.serialNumber}">SN-000000</div>
                        </div>

                        <div class="info-item">
                            <div class="info-label">飞行时间</div>
                            <div class="info-value" th:text="${drone.flightTime} + ' 小时'">0 小时</div>
                        </div>

                        <div class="info-item">
                            <div class="info-label">当前状态</div>
                            <div class="info-value">
                                <span th:if="${drone.status == '运行中'}"
                                    class="status-badge status-operational">运行中</span>
                                <span th:if="${drone.status == '维护中'}"
                                    class="status-badge status-maintenance">维护中</span>
                                <span th:if="${drone.status == '已退役'}" class="status-badge status-retired">已退役</span>
                                <span th:if="${drone.status == '已损坏'}" class="status-badge status-damaged">已损坏</span>
                            </div>
                        </div>

                        <div class="info-item">
                            <div class="info-label">无人机ID</div>
                            <div class="info-value mono" th:text="${drone.id}">1</div>
                        </div>

                        <div class="info-item full-width">
                            <div class="info-label">时间信息</div>
                            <div class="meta-info">
                                <div class="meta-item">创建时间：<span th:text="${drone.createdDate}">2024-01-01
                                        10:00:00</span>
                                </div>
                                <div class="meta-item">更新时间：<span th:text="${drone.updatedDate}">2024-01-01
                                        10:00:00</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card-footer">
                    <a th:href="@{/drones/edit/{id}(id=${drone.id})}" class="btn btn-warning">
                        <i class="fa fa-pencil"></i> 编辑
                    </a>
                    <a th:href="@{/drones/delete/{id}(id=${drone.id})}" class="btn btn-danger"
                        onclick="return confirm('确定要删除这台无人机吗？')">
                        <i class="fa fa-trash"></i> 删除
                    </a>
                    <a th:href="@{/drones}" class="btn btn-outline">
                        <i class="fa fa-list"></i> 返回列表
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
