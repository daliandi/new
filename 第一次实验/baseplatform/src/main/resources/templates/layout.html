<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ? ${title} : '无人机管理系统'"></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        :root {
            --primary-color: #4a90d9;
            --primary-dark: #3a7bc8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 12px 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .navbar-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
        }

        .navbar-brand i {
            font-size: 24px;
            background: linear-gradient(135deg, #00f5ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .navbar-nav {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .nav-link:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-link.active {
            color: #00f5ff;
            background: rgba(0, 245, 255, 0.15);
        }

        .btn-logout {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .btn-logout:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
            color: white;
        }

        .content-wrapper {
            flex: 1;
            padding-top: 70px;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="navbar-content">
            <a href="/drones" class="navbar-brand">
                <i class="fa fa-plane"></i>
                <span>无人机管理系统</span>
            </a>
            <div class="navbar-nav">
                <a href="/drones" class="nav-link" th:classappend="${activePage == 'drones'} ? 'active'">
                    <i class="fa fa-list"></i> 无人机列表
                </a>
                <a href="/drones/add" class="nav-link" th:classappend="${activePage == 'add'} ? 'active'">
                    <i class="fa fa-plus"></i> 添加无人机
                </a>
                <a href="/logout" class="btn-logout" onclick="return confirm('确定要退出登录吗？')">
                    <i class="fa fa-sign-out"></i> 退出登录
                </a>
            </div>
        </div>
    </nav>

    <div class="content-wrapper">
        <div th:replace="${content}"></div>
    </div>
</body>

</html>
