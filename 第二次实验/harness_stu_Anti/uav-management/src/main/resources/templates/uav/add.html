<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>无人机信息管理 - 新增</title>
    <link rel="stylesheet" th:href="@{/static/css/bootstrap.min.css}">
</head>
<body>
<nav class="navbar navbar-default" style="background:#3c8dbc; border:none; border-radius:0;">
    <div class="container-fluid">
        <span class="navbar-brand" style="color:#fff;"><i class="glyphicon glyphicon-plane"></i> 无人机信息管理系统</span>
        <ul class="nav navbar-nav navbar-right">
            <li><a href="/uav/list" style="color:#fff;">返回列表</a></li>
        </ul>
    </div>
</nav>

<div class="container" style="margin-top:20px; max-width:760px;">
    <div class="panel panel-primary">
        <div class="panel-heading">新增无人机信息</div>
        <div class="panel-body">
            <!-- AI 生成工具栏 -->
            <div class="form-group">
                <label>AI 自动生成属性</label>
                <div class="input-group">
                    <input type="text" id="aiModel" class="form-control" placeholder="输入型号描述，如：工业级固定翼">
                    <span class="input-group-btn">
                        <button class="btn btn-info" onclick="aiGenerate()">
                            <i class="glyphicon glyphicon-flash"></i> AI 生成
                        </button>
                    </span>
                </div>
            </div>
            <hr>
            <form id="addForm">
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>注册编号 <span class="text-danger">*</span></label>
                            <input type="text" id="uavCode" name="uavCode" class="form-control" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>型号 <span class="text-danger">*</span></label>
                            <input type="text" id="model" name="model" class="form-control" required>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>制造商</label>
                            <input type="text" id="manufacturer" name="manufacturer" class="form-control">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>最大载重 (kg)</label>
                            <input type="number" id="maxPayload" name="maxPayload" step="0.1" min="0" class="form-control">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-4">
                        <div class="form-group">
                            <label>最大飞行高度 (m)</label>
                            <input type="number" id="maxAltitude" name="maxAltitude" min="0" class="form-control">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-group">
                            <label>最大续航 (min)</label>
                            <input type="number" id="maxFlightTime" name="maxFlightTime" min="0" class="form-control">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-group">
                            <label>最大速度 (m/s)</label>
                            <input type="number" id="maxSpeed" name="maxSpeed" step="0.1" min="0" class="form-control">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-4">
                        <div class="form-group">
                            <label>翼展 (cm)</label>
                            <input type="number" id="wingspan" name="wingspan" step="0.1" min="0" class="form-control">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-group">
                            <label>自重 (kg)</label>
                            <input type="number" id="weight" name="weight" step="0.01" min="0" class="form-control">
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <textarea id="remark" name="remark" class="form-control" rows="2"></textarea>
                </div>
                <div class="text-right">
                    <a href="/uav/list" class="btn btn-default">取消</a>
                    <button type="button" class="btn btn-primary" onclick="submitAdd()">保存</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script th:src="@{/static/js/jquery.min.js}"></script>
<script>
function aiGenerate() {
    var model = document.getElementById('aiModel').value.trim();
    if (!model) { alert('请输入型号描述'); return; }
    fetch('/api/uav/ai-generate?model=' + encodeURIComponent(model))
        .then(r => r.json())
        .then(res => {
            if (res.code === 200 && res.data) {
                var d = res.data;
                document.getElementById('model').value = d.model || model;
                document.getElementById('manufacturer').value = d.manufacturer || '';
                document.getElementById('maxPayload').value = d.maxPayload || '';
                document.getElementById('maxAltitude').value = d.maxAltitude || '';
                document.getElementById('maxFlightTime').value = d.maxFlightTime || '';
                document.getElementById('maxSpeed').value = d.maxSpeed || '';
                document.getElementById('wingspan').value = d.wingspan || '';
                document.getElementById('weight').value = d.weight || '';
                document.getElementById('remark').value = d.remark || '';
            }
        });
}

function submitAdd() {
    var data = {
        uavCode: document.getElementById('uavCode').value,
        model: document.getElementById('model').value,
        manufacturer: document.getElementById('manufacturer').value,
        maxPayload: parseFloat(document.getElementById('maxPayload').value) || null,
        maxAltitude: parseInt(document.getElementById('maxAltitude').value) || null,
        maxFlightTime: parseInt(document.getElementById('maxFlightTime').value) || null,
        maxSpeed: parseFloat(document.getElementById('maxSpeed').value) || null,
        wingspan: parseFloat(document.getElementById('wingspan').value) || null,
        weight: parseFloat(document.getElementById('weight').value) || null,
        remark: document.getElementById('remark').value
    };
    fetch('/api/uav', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    }).then(r => r.json()).then(res => {
        if (res.code === 200) {
            alert('新增成功');
            location.href = '/uav/list';
        } else {
            alert('新增失败：' + res.msg);
        }
    });
}
</script>
</body>
</html>
