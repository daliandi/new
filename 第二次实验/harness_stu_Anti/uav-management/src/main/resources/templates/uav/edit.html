<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>无人机信息管理 - 编辑</title>
    <link rel="stylesheet" th:href="@{/static/css/bootstrap.min.css}">
</head>
<body>
<nav class="navbar navbar-default" style="background:#3c8dbc; border:none; border-radius:0;">
    <div class="container-fluid">
        <span class="navbar-brand" style="color:#fff;"><i class="glyphicon glyphicon-plane"></i> 无人机信息管理系统</span>
        <ul class="nav navbar-nav navbar-right">
            <li><a href="/uav/list" style="color:#fff;">返回列表</a></li>
        </ul>
    </div>
</nav>

<div class="container" style="margin-top:20px; max-width:760px;">
    <div class="panel panel-warning">
        <div class="panel-heading">编辑无人机信息 &nbsp;
            <small th:text="${'编号：' + uav.uavCode}"></small>
        </div>
        <div class="panel-body">
            <form id="editForm">
                <input type="hidden" id="uavId" th:value="${uav.id}">
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>注册编号</label>
                            <input type="text" class="form-control" th:value="${uav.uavCode}" disabled>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>型号 <span class="text-danger">*</span></label>
                            <input type="text" id="model" class="form-control" th:value="${uav.model}" required>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>制造商</label>
                            <input type="text" id="manufacturer" class="form-control" th:value="${uav.manufacturer}">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>最大载重 (kg)</label>
                            <input type="number" id="maxPayload" step="0.1" min="0" class="form-control" th:value="${uav.maxPayload}">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-4">
                        <div class="form-group">
                            <label>最大飞行高度 (m)</label>
                            <input type="number" id="maxAltitude" min="0" class="form-control" th:value="${uav.maxAltitude}">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-group">
                            <label>最大续航 (min)</label>
                            <input type="number" id="maxFlightTime" min="0" class="form-control" th:value="${uav.maxFlightTime}">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-group">
                            <label>最大速度 (m/s)</label>
                            <input type="number" id="maxSpeed" step="0.1" min="0" class="form-control" th:value="${uav.maxSpeed}">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-4">
                        <div class="form-group">
                            <label>翼展 (cm)</label>
                            <input type="number" id="wingspan" step="0.1" min="0" class="form-control" th:value="${uav.wingspan}">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-group">
                            <label>自重 (kg)</label>
                            <input type="number" id="weight" step="0.01" min="0" class="form-control" th:value="${uav.weight}">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-group">
                            <label>状态</label>
                            <select id="status" class="form-control">
                                <option value="1" th:selected="${uav.status == 1}">正常</option>
                                <option value="0" th:selected="${uav.status == 0}">停用</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <textarea id="remark" class="form-control" rows="2" th:text="${uav.remark}"></textarea>
                </div>
                <div class="text-right">
                    <a href="/uav/list" class="btn btn-default">取消</a>
                    <button type="button" class="btn btn-warning" onclick="submitEdit()">保存修改</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script th:src="@{/static/js/jquery.min.js}"></script>
<script>
function submitEdit() {
    var id = document.getElementById('uavId').value;
    var data = {
        id: parseInt(id),
        model: document.getElementById('model').value,
        manufacturer: document.getElementById('manufacturer').value,
        maxPayload: parseFloat(document.getElementById('maxPayload').value) || null,
        maxAltitude: parseInt(document.getElementById('maxAltitude').value) || null,
        maxFlightTime: parseInt(document.getElementById('maxFlightTime').value) || null,
        maxSpeed: parseFloat(document.getElementById('maxSpeed').value) || null,
        wingspan: parseFloat(document.getElementById('wingspan').value) || null,
        weight: parseFloat(document.getElementById('weight').value) || null,
        status: parseInt(document.getElementById('status').value),
        remark: document.getElementById('remark').value
    };
    fetch('/api/uav/' + id, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    }).then(r => r.json()).then(res => {
        if (res.code === 200) {
            alert('修改成功');
            location.href = '/uav/list';
        } else {
            alert('修改失败：' + res.msg);
        }
    });
}
</script>
</body>
</html>
