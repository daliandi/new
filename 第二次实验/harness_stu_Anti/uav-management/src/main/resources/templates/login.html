<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无人机信息管理系统 - 登录</title>
    <link rel="stylesheet" th:href="@{/static/css/bootstrap.min.css}">
    <style>
        body { background: #f5f5f5; }
        .login-box { width: 360px; margin: 120px auto; }
        .login-box .panel-heading { background: #3c8dbc; color: #fff; font-size: 16px; }
    </style>
</head>
<body>
<div class="login-box">
    <div class="panel panel-primary">
        <div class="panel-heading text-center">
            <i class="glyphicon glyphicon-plane"></i> 无人机信息管理系统
        </div>
        <div class="panel-body">
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <form method="post" action="/login">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="username" class="form-control" placeholder="请输入用户名" autofocus>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="password" class="form-control" placeholder="请输入密码">
                </div>
                <button type="submit" class="btn btn-primary btn-block">登 录</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
